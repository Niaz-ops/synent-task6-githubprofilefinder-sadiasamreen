<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>GitHub Profile Finder</h1>
    <p>Search any GitHub user and view their profile details.</p>
    <button id="themeBtn" type="button">🌙 Dark Mode</button>
  </header>

  <main class="container">
    <section class="search-box">
      <input type="text" id="username" placeholder="Enter GitHub username" aria-label="GitHub username">
      <button id="searchBtn" type="button">Search</button>
    </section>

    <div id="loading">Loading GitHub profile...</div>
    <p id="error"></p>

    <section id="profile" class="profile-card"></section>
    <section id="repositories" class="repositories-section"></section>
  </main>

  <footer class="footer">
    <p>© 2026 Sadia Samreen | Synent Technologies Task 6</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
